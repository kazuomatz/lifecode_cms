version: '3'

volumes:
  mysql_data:
  tmp_data:

services:
  app:
    build: .
    command: sh -c "${START_RAILS_COMMAND}"
    tty: true
    stdin_open: true
    environment:
      DB_HOST: db
      DB_USERNAME: root
      DB_PASSWORD: root
    volumes:
      - .:/app
      - tmp_data:/app/tmp
    ports:
      - "3000:3000"
      - "1234:1234"
      - "26162:26162"
    networks:
      - local_network  
    depends_on:
      - db
  db:
    image: mysql:5.7
    ports:
      - 4306:3306
    volumes:
      - mysql_data:/var/lib/mysql
      - ./containers/mysql/config:/etc/mysql/conf.d
    tty: true
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      TZ: "Asia/Tokyo"
    networks:
      - local_network  
networks:
  local_network:
    driver: 'bridge'
